name: Bake courses
on:
  workflow_dispatch:
    inputs:
      bbox:
        description: "Harvest bbox: south,west,north,east (blank to skip harvesting)"
        required: false
        default: "24,-125,50,-66"
      start:
        description: "Start index in course-list.json"
        required: false
        default: "0"
      count:
        description: "How many courses to bake this run"
        required: false
        default: "300"
permissions:
  contents: write
jobs:
  bake:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Harvest course list
        if: ${{ inputs.bbox != '' }}
        run: node bake.mjs harvest --bbox=${{ inputs.bbox }}
      - name: Bake courses
        run: node bake.mjs run ${{ inputs.start }} ${{ inputs.count }}
      - name: Commit results
        run: |
          git config user.name "course-baker"
          git config user.email "bot@users.noreply.github.com"
          git add courses course-list.json 2>/dev/null || true
          git commit -m "Bake courses (batch from ${{ inputs.start }})" || echo "nothing to commit"
          git push
